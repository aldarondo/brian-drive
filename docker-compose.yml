services:
  brian-drive:
    image: ghcr.io/aldarondo/brian-drive:latest
    container_name: brian-drive
    restart: unless-stopped
    env_file: /volume1/docker/brian-drive/.env
    volumes:
      - /volume1/docker/brian-drive/google-sa.json:/run/secrets/google-sa.json:ro
    environment:
      - GOOGLE_SERVICE_ACCOUNT_JSON=/run/secrets/google-sa.json
      - WATCH_FOLDER_ID=${WATCH_FOLDER_ID}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - BRIAN_MEM_URL=${BRIAN_MEM_URL:-http://brian-mcp:3001}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8776}
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
